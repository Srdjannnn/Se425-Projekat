{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<h2>Upcoming Events</h2>
<ul>
    {% for event in events %}
    <li>
        <h3>{{ event.name }}</h3>
        <p>{{ event.date }}</p>
        <p>{{ event.description }}</p>
        <a href="{{ url_for('event', event_id=event.id) }}">View Seats</a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
